<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Timer and Stopwatch</title>
        <link rel="icon" href="favicon.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    </head>    
    <body>
        <nav>
            <div class="logo-text">VIRTUAL CLOCK</div>
        </nav>
        <div class="parent-container"> 
            <div class="sidebar">
                <div class="menu-item active" id="time-menu">
                    <span class="material-symbols-outlined">alarm</span>
                    <span>Time</span>
                </div>
                <div class="menu-item" id="stopwatch-menu">
                    <span class="material-symbols-outlined">timer</span>
                    <span>Stopwatch</span>
                </div>
                <div class="menu-item" id="timer-menu">
                    <span class="material-symbols-outlined">hourglass</span>
                    <span>Timer</span>
                </div>
            </div>
            <div class="main-content">
                <div class="content-card">
                    <div class="home-page">
                        <div class="clock-container">

                            <div id="time">
                                00:00:00
                            </div>
                            
                            <div id="day">
                                Monday
                            </div>

                            <div id="date">
                                19 July 2026
                            </div>
                            <div>   
                                <button id="time-format-btn">Switch to 24 Hour Format</button>
                            </div>
                        </div>
                    </div>    
                    <div class="stopwatch-page hidden">
                        <div class="stopwatch-container">
                            <div class="stopwatch-time">
                                00:00:00
                            </div>
                            <div class="stopwatch-controls">
                                <button id="start-stopwatch">
                                    <span class="material-symbols-outlined">play_arrow</span>
                                    <span>Start</span>
                                </button>
                                <button id="stop-stopwatch">
                                    <span class="material-symbols-outlined">stop</span>
                                    <span>Stop</span>
                                </button>
                                <button id="reset-stopwatch">
                                    <span class="material-symbols-outlined">restart_alt</span>
                                    <span>Reset</span>
                                </button>
                                <button id="lap-stopwatch">
                                    <span class="material-symbols-outlined">flag</span>
                                    <span>Lap</span>
                                </button>
                            </div>
                            <div class="stopwatch-laps hidden">
                                <div class="lap-header">
                                    <span>#</span>
                                    <span>Lap</span>
                                    <span>Time</span>
                                </div>
                                <div id="laps-list"></div>
                            </div>
                        </div>
                    </div>
                    <div class="timer-page hidden">
                        <div class="timer-container">
                            <div class="timer-inputs">
                                <input type="number" id="hours" placeholder="HH" min="0" max="99" autocomplete="off"><span>:</span>
                                <input type="number" id="minutes" placeholder="MM" min="0" max="59" autocomplete="off"><span>:</span>
                                <input type="number" id="seconds" placeholder="SS" min="0" max="59" autocomplete="off"> 
                            </div>
                            <div class="timer-display">
                                00:00:00
                            </div>
                            <div class="timer-controls">
                                <button id="start-timer">
                                    <span class="material-symbols-outlined">play_arrow</span>
                                    <span>Start</span>
                                </button>
                                <button id="pause-timer">
                                    <span class="material-symbols-outlined">pause</span>
                                    <span>Pause</span>
                                </button>
                                <button id="reset-timer">
                                    <span class="material-symbols-outlined">restart_alt</span>
                                    <span>Reset</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>  
        <script src="script.js"></script>
    </body>
</html>
